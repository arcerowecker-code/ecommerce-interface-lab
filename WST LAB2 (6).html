    <header>
        <h1>UEPSHOP</h1>
        <nav>
            <ul>

                <li><a href="#profile-settings">Profile Settings</a></li>
                <li><a href="#wishlist">Wishlist</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
        <section>
            <form action="#" method="post">
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required />
                </div>
                <div>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required />
                </div>
                <button type="submit">Submit</button>
            </form>
        </section>

        <br>
        <section id="order-history">
            <h2>Previous Purchases</h2>

            <dl>
                <dt>Order #12345 - 2024-01-15</dt>
                <dd>
                    <details>
                        <summary><button>View Details</button></summary>
                        <p>Product A - Quantity: 2 - $29.99 each</p>
                        <p>Product B - Quantity: 1 - $49.99 each</p>
                        <p>Total: $109.97</p>
                    </details>
                </dd>
                    <br><br>
                <dt>Order #67890 - 2023-11-05</dt>
                <dd>
                    <details>
                        <summary><button>View Details</button></summary>
                        <p>Product C - Quantity: 1 - $19.99 each</p>
                        <p>Total: $19.99</p>
                    </details>
                </dd>

                
            </dl>
        </section>

    </main>
