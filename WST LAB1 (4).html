<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Cart</title>
</head>
<body>
    <h1>Your Shopping Cart</h1>

    
    <ul>
        <li>
            <img src="product1.jpg" alt="FOODAH" />
            <h3>JOLIBEE SA MANOK</h3>
            <p>Price: $29.99</p>
            <label for="qty-product1">Quantity:</label>
            <input type="number" id="qty-product1" name="qty-product1" min="1" value="1" />
        </li>
        <li>
            <img src="product2.jpg" alt="CHOLESTEROL" />
            <h3>CHICKEN OIL SA OIL</h3>
            <p>Price: $49.99</p>
            <label for="qty-product2">Quantity:</label>
            <input type="number" id="qty-product2" name="qty-product2" min="1" value="2" />
        </li>
    </ul>

    
    <section>
        <p>Subtotal: $129.97</p>
    </section>

    
    <a href="checkout.html" role="button">Proceed to Checkout</a>

   
    <section>
        <p>Your cart is currently empty.</p>
    </section>
    
</body>
</html>
